<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="widget-version" content="1.4.0">
<title>Route map</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D8GYSB22FR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-D8GYSB22FR', { anonymize_ip: true, send_page_view: false });
</script>
<!--
  map.html — Stylized route map · 480 × 320 (fluid)
  Query params (all optional):
    ?stops=Canggu,Ubud,Nusa+Penida,Ceningan&active=Ubud

  Behavior:
    - Geocodes each stop via Open-Meteo (free, no auth) → projects lat/lon onto SVG canvas
    - Dashed coral polyline connects stops in order
    - Pulsing accent dot marks the active stop
    - Tap the map → opens the route in Google Maps (new tab)
    - Small "Find stays in {active}" link → Trip.com with affiliate ID

  GA events: widget_view, map_open (route→Google Maps), stays_from_map
-->
<link rel="stylesheet" href="assets/tokens.css">
<style>
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #2F3438; }
  .map { position: absolute; inset: 0; box-sizing: border-box; padding: 14px 16px 12px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; }
  .hdr { display: flex; justify-content: space-between; align-items: baseline; }
  .hdr h2 { font-family: var(--font-display); font-size: 18px; font-style: italic; color: var(--accent); margin: 0; line-height: 1.1; }
  .hdr .caps { font-size: 9px; color: var(--text-faint); }
  .canvas { flex: 1; min-height: 0; position: relative; background: var(--card-2); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .canvas svg { display: block; width: 100%; height: 100%; }
  .canvas .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); }
  .route-line { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 4 3; opacity: 0.75; }
  .pin { fill: var(--card); stroke: var(--accent); stroke-width: 1.5; }
  .pin-active { fill: var(--accent); }
  .pin-pulse { fill: var(--accent); opacity: 0.45; transform-origin: center; animation: pulse 1.8s ease-out infinite; }
  @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3.2); opacity: 0; } }
  .label { font-family: var(--font-sans, sans-serif); font-size: 10px; fill: var(--text-dim); letter-spacing: 0.02em; }
  .label-active { fill: var(--accent); font-weight: 500; }
  .ft { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; }
  .ft .cta { color: var(--text-dim); }
  .map:hover .ft .cta { color: var(--accent); }
  .stays-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; padding-top: 6px; border-top: 1px dashed var(--line); }
  .stays-row .stays-link { color: var(--text-dim); text-decoration: none; letter-spacing: 0.04em; }
  .stays-row .stays-link em { font-style: normal; color: var(--accent); }
  .stays-row .stays-link:hover { color: var(--accent); }
  .stays-row .disclosure { color: var(--text-faint); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── edit button (top-left, mirrors countdown) ── */
  .edit-btn { position: absolute; top: 8px; left: 10px; font-size: 10px; letter-spacing: 0.1em; color: var(--text-faint); cursor: pointer; background: none; border: none; padding: 2px 4px; z-index: 3; }
  .edit-btn:hover { color: var(--accent); }

  /* ── edit view ── */
  #edit-view { position: absolute; inset: 0; box-sizing: border-box; padding: 12px 14px; display: none; flex-direction: column; gap: 8px; overflow-y: auto; background: var(--card); }
  #edit-view.active { display: flex; }
  #edit-view h3 { font-family: var(--font-display); font-style: italic; font-size: 17px; color: var(--accent); margin: 0; line-height: 1.1; }
  #edit-view .subtitle { font-size: 9px; color: var(--text-faint); letter-spacing: 0.14em; text-transform: uppercase; margin-top: -4px; }
  .stop-row { display: flex; gap: 6px; align-items: center; }
  .stop-row input[type="text"] { flex: 1; min-width: 0; background: var(--card-2); border: 1px solid var(--hairline, var(--line)); border-radius: 4px; padding: 5px 7px; font-size: 11px; color: var(--text); outline: none; font-family: inherit; }
  .stop-row input[type="radio"] { accent-color: var(--accent); }
  .stop-row .rm { background: none; border: 1px solid var(--line); border-radius: 4px; padding: 3px 7px; font-size: 11px; color: var(--text-faint); cursor: pointer; }
  .stop-row .rm:hover { color: #ff5a5a; border-color: #ff5a5a; }
  .stop-row label { font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 3px; }
  #add-stop { background: none; border: 1px dashed var(--line); border-radius: 4px; padding: 6px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); cursor: pointer; }
  #add-stop:hover { color: var(--accent); border-color: var(--accent-line); }
  .edit-actions { display: flex; gap: 6px; margin-top: auto; }
  .btn-apply { flex: 1; background: var(--accent); border: none; border-radius: 4px; padding: 7px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; cursor: pointer; font-family: inherit; }
  .btn-apply:hover { opacity: 0.88; }
  .btn-edit-cancel { background: none; border: 1px solid var(--line); border-radius: 4px; padding: 7px 10px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div class="map card" id="map-card" role="link" tabindex="0" aria-label="Open route in Google Maps">
  <div class="grain"></div>
  <button class="edit-btn" id="edit-btn" title="Edit route">✎ Edit</button>
  <div class="hdr" style="padding-left:48px">
    <h2 id="title">Route</h2>
    <span class="caps" id="stop-count">— stops</span>
  </div>
  <div class="canvas" id="canvas">
    <div class="loading" id="loading">Plotting route…</div>
    <svg id="svg" viewBox="0 0 480 220" preserveAspectRatio="xMidYMid meet" style="display:none"></svg>
  </div>
  <div class="ft">
    <span id="stops-list">—</span>
    <span class="cta">Tap map → Google Maps</span>
  </div>
  <div class="stays-row">
    <a class="stays-link" id="stays-link" href="#" target="_blank" rel="noopener noreferrer sponsored">Find stays in <em id="stays-city">—</em> →</a>
    <small class="disclosure">affiliate</small>
  </div>
</div>

<!-- ── EDIT VIEW ── -->
<div id="edit-view" class="card">
  <div class="grain"></div>
  <h3>Edit route</h3>
  <div class="subtitle">Drag is not supported — reorder by retyping</div>
  <div id="stops-editor"></div>
  <button id="add-stop">+ Add stop</button>
  <div class="edit-actions">
    <button class="btn-apply" id="btn-apply">Apply</button>
    <button class="btn-edit-cancel" id="btn-edit-cancel">Cancel</button>
  </div>
</div>

<script>
  // ── error boundary (scoped to this widget file only) ───────────────────
  const OWN_FILE = location.pathname.split('/').pop() || 'widget.html';
  window.addEventListener('error', (e) => {
    if (!e.error) return;
    if (!e.filename || !e.filename.includes(OWN_FILE)) return;
    showOfflineCard('script');
  });
  window.addEventListener('unhandledrejection', (e) => {
    const reason = e.reason;
    const msg = String(reason && (reason.message || reason));
    const stack = String(reason && reason.stack || '');
    if (!stack.includes(OWN_FILE)) return;
    if (/fetch|network|failed|abort/i.test(msg)) showOfflineCard('network');
  });
  function showOfflineCard(code) {
    document.body.innerHTML = `
      <div class="card" style="position:absolute;inset:0;display:flex;flex-direction:column;
           justify-content:center;align-items:center;padding:24px;text-align:center;gap:10px;">
        <div class="grain"></div>
        <div class="caps" style="color:var(--text-faint)">Widget unavailable</div>
        <div class="serif" style="font-size:20px">Couldn't plot the route</div>
        <div style="color:var(--text-dim);font-size:12px;max-width:280px">
          Check your connection or disable any script-blocking extension for this page.
        </div>
        <button onclick="location.reload()" class="btn-ghost" style="margin-top:6px">Retry</button>
        <div class="caps mono" style="color:var(--text-faint);font-size:9px">code · ${code}</div>
      </div>`;
  }

  // ── config ─────────────────────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  // Pre-fill from URL params only — no hardcoded defaults (empty = setup prompt)
  const stopsRaw = (params.get('stops') || '').split(',')
    .map(s => s.trim()).filter(Boolean);
  const activeName = (params.get('active') || stopsRaw[Math.floor(stopsRaw.length / 2)] || '').trim();

  // Trip.com affiliate config (same IDs as stays.html)
  const AFF = {
    allianceId: "8106827",
    sid:        "307071563",
    sub1:       "Widget",
    sub3:       "D15855548",
  };

  $('stop-count').textContent = stopsRaw.length + ' stops';
  $('stops-list').textContent = stopsRaw.join(' · ');
  // Route title = first → last
  if (stopsRaw.length >= 2) $('title').textContent = stopsRaw[0] + ' → ' + stopsRaw[stopsRaw.length - 1];
  else if (stopsRaw.length === 1) $('title').textContent = stopsRaw[0];

  // Stays affiliate link targets the active stop (fall back to first stop)
  const staysCity = activeName || stopsRaw[0] || '';
  $('stays-city').textContent = staysCity || 'your next stop';
  function buildStaysUrl(city) {
    const q = new URLSearchParams({
      Allianceid:  AFF.allianceId,
      SID:         AFF.sid,
      trip_sub1:   AFF.sub1,
      trip_sub3:   AFF.sub3,
      trip_sub2:   'map_' + (city || '').toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'').slice(0,40),
      locale:      'en-XX',
      curr:        'USD',
      barCurr:     'USD',
    });
    if (city) {
      q.set('searchWord', city);
      q.set('cityName',   city);
      q.set('searchType', 'CT');
    }
    return 'https://www.trip.com/hotels/list?' + q.toString();
  }
  $('stays-link').href = staysCity ? buildStaysUrl(staysCity) : '#';
  $('stays-link').addEventListener('click', (e) => {
    e.stopPropagation(); // don't also trigger the map's tap-to-Maps handler
    if (!staysCity) { e.preventDefault(); return; }
    try { if (window.gtag) gtag('event', 'stays_from_map', { widget: 'map', destination: staysCity }); } catch(_){}
  });

  // Fire widget_view once on load
  try { if (window.gtag) gtag('event', 'widget_view', { widget: 'map', stop_count: stopsRaw.length }); } catch(_){}

  // ── geocode each stop ──────────────────────────────────────────────────
  // Open-Meteo geocoding is free, no-auth, CORS-enabled.
  async function geocode(name) {
    const url = 'https://geocoding-api.open-meteo.com/v1/search?count=1&language=en&format=json&name='
      + encodeURIComponent(name);
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 4500);
    try {
      const res = await fetch(url, { signal: ctrl.signal });
      if (!res.ok) throw new Error('geocode ' + res.status);
      const json = await res.json();
      const r = json.results && json.results[0];
      if (!r) return null;
      return { name, lat: r.latitude, lon: r.longitude };
    } finally {
      clearTimeout(t);
    }
  }

  // ── project lat/lon onto the SVG canvas with padding ───────────────────
  function project(points, w, h, pad) {
    if (!points.length) return [];
    const lats = points.map(p => p.lat);
    const lons = points.map(p => p.lon);
    let minLat = Math.min(...lats), maxLat = Math.max(...lats);
    let minLon = Math.min(...lons), maxLon = Math.max(...lons);
    // Degenerate: single point or all identical → center it
    if (minLat === maxLat) { minLat -= 0.05; maxLat += 0.05; }
    if (minLon === maxLon) { minLon -= 0.05; maxLon += 0.05; }
    // Keep aspect reasonable — expand the smaller span so the route doesn't
    // degenerate into a near-straight line across the whole canvas.
    const latSpan = maxLat - minLat;
    const lonSpan = maxLon - minLon;
    const targetAspect = (w - 2 * pad) / (h - 2 * pad);
    const currentAspect = lonSpan / latSpan;
    if (currentAspect < targetAspect) {
      const need = latSpan * targetAspect - lonSpan;
      minLon -= need / 2; maxLon += need / 2;
    } else {
      const need = lonSpan / targetAspect - latSpan;
      minLat -= need / 2; maxLat += need / 2;
    }
    return points.map(p => ({
      name: p.name,
      x: pad + (p.lon - minLon) / (maxLon - minLon) * (w - 2 * pad),
      // SVG y is top-down; lat is south-to-north, so invert
      y: pad + (maxLat - p.lat) / (maxLat - minLat) * (h - 2 * pad),
    }));
  }

  // ── render SVG ─────────────────────────────────────────────────────────
  function render(projected) {
    const svg = $('svg');
    const W = 480, H = 220;
    const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Dashed route polyline
    const path = projected.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ' ' + p.y.toFixed(1)).join(' ');
    let out = '';
    if (projected.length >= 2) out += `<path class="route-line" d="${path}"/>`;

    // Pins + labels
    projected.forEach((p, i) => {
      const isActive = p.name.toLowerCase() === activeName.toLowerCase();
      if (isActive) {
        out += `<circle class="pin-pulse" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5"/>`;
        out += `<circle class="pin pin-active" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5"/>`;
      } else {
        out += `<circle class="pin" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5"/>`;
      }
      // Label placement: above pin unless too close to top edge
      const labelY = p.y < 24 ? p.y + 16 : p.y - 9;
      // Horizontal: center on pin, but clamp within canvas
      let anchor = 'middle';
      let labelX = p.x;
      if (p.x < 40) { anchor = 'start'; labelX = p.x + 7; }
      else if (p.x > W - 40) { anchor = 'end'; labelX = p.x - 7; }
      out += `<text class="label ${isActive ? 'label-active' : ''}" x="${labelX.toFixed(1)}" y="${labelY.toFixed(1)}" text-anchor="${anchor}">${esc(p.name)}</text>`;
    });

    svg.innerHTML = out;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.style.display = 'block';
    $('loading').style.display = 'none';
  }

  function showEmpty(msg) {
    $('loading').textContent = msg || 'No stops to show';
    $('loading').style.color = 'var(--text-faint)';
  }

  // ── open Google Maps directions ────────────────────────────────────────
  function openInMaps() {
    if (!stopsRaw.length) return;
    try { if (window.gtag) gtag('event', 'map_open', { widget: 'map', stop_count: stopsRaw.length, destination: staysCity }); } catch(_){}
    // Directions URL: /maps/dir/<stop1>/<stop2>/...
    const url = 'https://www.google.com/maps/dir/' + stopsRaw.map(encodeURIComponent).join('/');
    window.open(url, '_blank', 'noopener,noreferrer');
  }
  $('map-card').addEventListener('click', (e) => {
    // Don't open Maps if the click was on Edit, the stays affiliate link, or any toast control
    if (e.target.closest('.edit-btn') || e.target.closest('.stays-link') || e.target.closest('#notion-toast')) return;
    openInMaps();
  });
  $('map-card').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openInMaps(); }
  });

  // ── iframe detection ──────────────────────────────────────────────────
  const inIframe = (() => { try { return window.self !== window.top; } catch { return true; } })();

  // ── edit view ─────────────────────────────────────────────────────────
  function renderEditor(stops, active) {
    const ed = $('stops-editor');
    ed.innerHTML = '';
    stops.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'stop-row';
      row.innerHTML = `
        <input type="text" value="${s.replace(/"/g, '&quot;')}" placeholder="City or region" data-i="${i}">
        <label><input type="radio" name="active-stop" data-i="${i}" ${s.toLowerCase() === active.toLowerCase() ? 'checked' : ''}> active</label>
        <button class="rm" data-i="${i}" title="Remove stop">×</button>
      `;
      ed.appendChild(row);
    });
    ed.querySelectorAll('.rm').forEach(btn => {
      btn.addEventListener('click', () => {
        const inputs = ed.querySelectorAll('input[type="text"]');
        const vals = Array.from(inputs).map(x => x.value);
        const idx = parseInt(btn.dataset.i, 10);
        vals.splice(idx, 1);
        const activeInput = ed.querySelector('input[type="radio"]:checked');
        const newActive = activeInput ? vals[parseInt(activeInput.dataset.i, 10)] || vals[0] || '' : '';
        renderEditor(vals.length ? vals : [''], newActive);
      });
    });
  }

  $('edit-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    renderEditor(stopsRaw.length ? stopsRaw : [''], activeName);
    $('edit-view').classList.add('active');
  });

  $('add-stop').addEventListener('click', () => {
    const inputs = $('stops-editor').querySelectorAll('input[type="text"]');
    const vals = Array.from(inputs).map(x => x.value);
    const activeInput = $('stops-editor').querySelector('input[type="radio"]:checked');
    const cur = activeInput ? vals[parseInt(activeInput.dataset.i, 10)] || '' : '';
    vals.push('');
    renderEditor(vals, cur);
  });

  $('btn-edit-cancel').addEventListener('click', () => {
    $('edit-view').classList.remove('active');
  });

  $('btn-apply').addEventListener('click', () => {
    const inputs = $('stops-editor').querySelectorAll('input[type="text"]');
    const newStops = Array.from(inputs).map(x => x.value.trim()).filter(Boolean);
    if (!newStops.length) return;
    const activeInput = $('stops-editor').querySelector('input[type="radio"]:checked');
    const idx = activeInput ? parseInt(activeInput.dataset.i, 10) : 0;
    const newActive = newStops[idx] || newStops[0];

    const newUrl = location.origin + location.pathname
      + '?stops=' + newStops.map(encodeURIComponent).join(',')
      + '&active=' + encodeURIComponent(newActive);

    if (inIframe) {
      // Show the copy-URL toast, same pattern as countdown.html
      showCopyToast(newUrl);
      $('edit-view').classList.remove('active');
    } else {
      // Standalone: just navigate — URL drives the widget
      location.href = newUrl;
    }
  });

  function showCopyToast(shareUrl) {
    const existing = document.getElementById('notion-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.id = 'notion-toast';
    toast.style.cssText = [
      'position:absolute','left:10px','right:10px','bottom:10px',
      'background:var(--card-2)','border:1px solid var(--line)','border-radius:6px',
      'padding:8px 10px','font-size:10px','color:var(--text-dim)','line-height:1.35',
      'display:flex','flex-direction:column','gap:6px','z-index:5',
      'box-shadow:0 4px 16px rgba(0,0,0,0.35)',
    ].join(';');
    toast.innerHTML = `
      <div>Notion won't remember this on refresh. Copy URL → paste in /embed block to save the new route.</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input id="toast-url" readonly value="${shareUrl.replace(/"/g, '&quot;')}" style="flex:1;min-width:0;box-sizing:border-box;background:var(--card-2);border:1px solid var(--hairline,var(--line));border-radius:4px;padding:4px 6px;font-size:9px;font-family:var(--font-mono,monospace);color:var(--text);outline:none;">
        <button id="toast-copy" style="background:var(--accent);border:none;border-radius:4px;padding:5px 9px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#fff;cursor:pointer">Copy</button>
        <button id="toast-close" style="background:none;border:1px solid var(--line);border-radius:4px;padding:5px 7px;font-size:10px;color:var(--text-dim);cursor:pointer">×</button>
      </div>`;
    document.body.appendChild(toast);
    document.getElementById('toast-copy').addEventListener('click', (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(shareUrl).then(() => {
        const btn = document.getElementById('toast-copy');
        btn.textContent = '✓'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      }).catch(() => {
        const i = document.getElementById('toast-url');
        i.select(); i.setSelectionRange(0, 99999);
      });
    });
    document.getElementById('toast-close').addEventListener('click', (e) => {
      e.stopPropagation(); toast.remove();
    });
  }

  // ── init ───────────────────────────────────────────────────────────────
  (async () => {
    if (!stopsRaw.length) { showEmpty('Add ?stops=City,City to plot a route'); return; }
    try {
      const results = await Promise.all(stopsRaw.map((s) => geocode(s).catch(() => null)));
      const points = results.filter(Boolean);
      if (!points.length) { showEmpty('Couldn\'t locate any stops'); return; }
      const projected = project(points, 480, 220, 24);
      render(projected);
    } catch (err) {
      console.warn('map render failed:', err);
      showEmpty('Couldn\'t plot the route');
    }
  })();
</script>
</body>
</html>
