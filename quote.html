<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start: #0d1117;
    --bg-end:   #0f1114;
    --card:     #1a1e24;
    --line:     rgba(255,255,255,0.07);
    --text:     #ededea;
    --text-dim: #9a9a94;
    --text-faint: #646460;
    --accent:   #d4af9a;        /* muted warm gold/sand — quote widget accent */
    --accent-soft: rgba(212,175,154,0.12);
    --accent-line: rgba(212,175,154,0.3);
    --glyph:    rgba(212,175,154,0.18);
    --pink:     #c97a6a;        /* author dash accent */
    --font-serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --font-ui:  system-ui, -apple-system, sans-serif;
    --radius:   10px;
    --transition: 600ms ease;
  }

  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    overflow: hidden;
    background: transparent;
    color: var(--text);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Grain overlay (matches tokens.css .grain pattern) ── */
  .grain {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
    z-index: 0;
  }

  /* ── Widget shell ── */
  .quote-widget {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    background: #191919;
    overflow: hidden;
  }

  /* ── Language pill row ── */
  .lang-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: flex-end; align-items: center;
    padding: 10px 14px 0;
    gap: 2px;
    flex-shrink: 0;
  }
  .lang-btn {
    background: none; border: none; border-radius: 20px;
    padding: 3px 8px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lang-btn:hover { color: var(--text-dim); background: rgba(255,255,255,0.05); }
  .lang-btn.active {
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ── Main quote stage — clicks here = next ── */
  .quote-stage {
    flex: 1; position: relative; z-index: 5;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 20px 32px 8px;
    cursor: pointer;
    user-select: none;
    min-height: 0;
  }

  /* ── Decorative opening glyph ── */
  .deco-glyph {
    position: absolute;
    top: 12px; left: 24px;
    font-family: var(--font-serif);
    font-size: clamp(72px, 12vw, 110px);
    line-height: 1;
    color: var(--glyph);
    pointer-events: none;
    user-select: none;
    z-index: 0;
    font-style: normal;
  }

  /* ── Quote card (fade-able content) ── */
  .quote-card {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    max-width: 600px; width: 100%;
    transition: opacity var(--transition), transform var(--transition);
  }
  .quote-card.fade-out {
    opacity: 0;
    transform: translateY(8px);
  }
  .quote-card.fade-in {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Quote text ── */
  .quote-text {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: clamp(18px, 3.2vw, 24px);
    line-height: 1.62;
    color: var(--text);
    letter-spacing: 0.01em;
    margin-bottom: 20px;
  }

  /* ── Author line ── */
  .quote-author {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-ui);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .author-dash {
    display: inline-block;
    width: 18px; height: 1px;
    background: var(--pink);
    flex-shrink: 0;
  }

  /* ── Destination CTA ── */
  .quote-cta {
    margin-top: 16px;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
    opacity: 0.85;
    transition: opacity 0.2s;
    display: inline-block;
  }
  .quote-cta:hover { opacity: 1; text-decoration: underline; text-underline-offset: 3px; }

  /* ── Nav arrows ── */
  .nav-arrows {
    position: absolute; inset: 0; z-index: 8;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px;
    pointer-events: none;
  }
  .nav-btn {
    pointer-events: all;
    background: none; border: none;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-faint);
    font-size: 18px;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.25s, background 0.15s, color 0.15s;
  }
  .quote-widget:hover .nav-btn { opacity: 1; }
  .nav-btn:hover { background: rgba(255,255,255,0.07); color: var(--accent); }
  /* Don't let arrow clicks also trigger stage click */
  .nav-btn { z-index: 9; }

  /* ── Progress dots ── */
  .progress-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: center; align-items: center;
    gap: 5px;
    padding: 4px 14px 6px;
    flex-shrink: 0;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }
  .dot.active {
    background: var(--accent);
    transform: scale(1.5);
  }

  /* ── Timer bar ── */
  .timer-track {
    position: relative; z-index: 10;
    height: 1px;
    background: var(--line);
    flex-shrink: 0;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--pink), var(--accent));
    transition: width linear;
  }

  /* ── Footer / affiliate disclosure ── */
  .widget-footer {
    position: relative; z-index: 10;
    display: flex; justify-content: flex-end; align-items: center;
    padding: 4px 14px 8px;
    flex-shrink: 0;
  }
  .disclosure {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint);
  }

  /* ── Fallback / error state ── */
  .fallback {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 32px; text-align: center; gap: 12px;
  }
  .fallback-text {
    font-family: var(--font-serif); font-style: italic;
    font-size: 20px; color: var(--text); line-height: 1.6;
  }
  .fallback-author {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Responsive tweaks ── */
  @media (max-width: 460px) {
    .quote-stage { padding: 16px 20px 6px; }
    .deco-glyph { font-size: 64px; top: 8px; left: 14px; }
    .quote-text { font-size: 17px; }
  }
  @media (min-width: 800px) {
    .quote-text { font-size: 24px; }
  }
</style>

// ── Trip.com destination display names ───────────────────────────────────────
const DEST_LABELS = {
  paris:      "Paris",
  tokyo:      "Tokyo",
  bali:       "Bali",
  rome:       "Rome",
  bangkok:    "Bangkok",
  "new-york": "New York",
  london:     "London",
  kyoto:      "Kyoto",
  istanbul:   "Istanbul",
  marrakech:  "Marrakech",
  barcelona:  "Barcelona",
  dubai:      "Dubai",
  santorini:  "Santorini",
  iceland:    "Iceland",
  patagonia:  "Patagonia",
};

// ── CTA translation maps ──────────────────────────────────────────────────────
const CTA_FOOTER = {
  en: '✦ Plan your next trip →',
  es: '✦ Planea tu próximo viaje →',
  fr: '✦ Planifiez votre prochain voyage →',
  ja: '✦ 次の旅を計画する →',
  zh: '✦ 规划你的下一次旅行 →',
  ko: '✦ 다음 여행을 계획하세요 →',
};

// {destination} is a placeholder replaced at render time with the destination name
const CTA_DESTINATION = {
  en: '✦ Discover {destination} →',
  es: '✦ Descubre {destination} →',
  fr: '✦ Découvrir {destination} →',
  ja: '✦ {destination} を旅する →',
  zh: '✦ 探索{destination} →',
  ko: '✦ {destination} 떠나기 →',
};

function getCtaText(ctaMap, substitutions) {
  const lang   = currentLang in ctaMap ? currentLang : 'en';
  let   text   = ctaMap[lang];
  if (substitutions) {
    Object.keys(substitutions).forEach(k => {
      text = text.replace(`{${k}}`, substitutions[k]);
    });
  }
  return text;
}

// ── State ─────────────────────────────────────────────────────────────────────
const LS_LANG_KEY = 'quote-widget:lang';
const ROTATION_MS = 12000;
const ENGAGED_MS  = 8000;

let currentIndex = Math.floor(Math.random() * QUOTES.length);
let currentLang  = 'en';
let autoTimer    = null;
let engageTimer  = null;
let timerStart   = null;
let timerRafId   = null;
let isPaused     = false;
let isFading     = false;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const widgetEl   = document.getElementById('widget');
const card       = document.getElementById('quote-card');
const textEl     = document.getElementById('quote-text');
const authorEl   = document.getElementById('quote-author');
const ctaEl      = document.getElementById('quote-cta');
const timerFill  = document.getElementById('timer-fill');
const progressBar= document.getElementById('progress-bar');
const langBar    = document.getElementById('lang-bar');
const stage      = document.getElementById('quote-stage');

// ── GA4 helpers ───────────────────────────────────────────────────────────────
function gaEvent(name, params) {
  if (window.gtag) {
    gtag('event', name, Object.assign({ widget: 'quote' }, params));
  }
}

// ── Language ──────────────────────────────────────────────────────────────────
function setLanguage(lang, fromChange) {
  const prev = currentLang;
  currentLang = lang;
  try { localStorage.setItem(LS_LANG_KEY, lang); } catch(_) {}

  // Update pill buttons
  langBar.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  // Re-render current quote text (no transition needed, instant)
  renderQuoteContent(QUOTES[currentIndex], false);

  if (fromChange && prev !== lang) {
    gaEvent('language_change', { from: prev, to: lang });
  }
}

function getTranslation(quote, lang) {
  return (quote.text[lang] && quote.text[lang].trim())
    ? quote.text[lang]
    : quote.text['en'];
}

// ── Progress dots ─────────────────────────────────────────────────────────────
function buildDots() {
  progressBar.innerHTML = '';
  // Only show up to 10 dots to avoid clutter; show position indicator instead
  const total = QUOTES.length;
  const show  = Math.min(total, 10);
  for (let i = 0; i < show; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentIndex % show ? ' active' : '');
    dot.setAttribute('aria-label', `Quote ${i + 1}`);
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      const target = Math.floor(currentIndex / show) * show + i;
      goTo(target < total ? target : i, true);
    });
    progressBar.appendChild(dot);
  }
}

function updateDots() {
  const show = Math.min(QUOTES.length, 10);
  const active = currentIndex % show;
  progressBar.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === active);
  });
}

// ── Timer bar ─────────────────────────────────────────────────────────────────
function startTimerBar() {
  timerStart = performance.now();
  cancelAnimationFrame(timerRafId);
  function frame(now) {
    if (isPaused) { timerRafId = requestAnimationFrame(frame); return; }
    const elapsed = now - timerStart;
    const pct = Math.min(100, (elapsed / ROTATION_MS) * 100);
    timerFill.style.width = pct + '%';
    if (pct < 100) timerRafId = requestAnimationFrame(frame);
  }
  timerRafId = requestAnimationFrame(frame);
}

function resetTimerBar() {
  cancelAnimationFrame(timerRafId);
  timerFill.style.width = '0%';
}

// ── Auto-advance ──────────────────────────────────────────────────────────────
function startAutoRotation() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    if (!isPaused) advance(1);
  }, ROTATION_MS);
}

function stopAutoRotation() {
  clearTimeout(autoTimer);
}

// ── Engagement timer ──────────────────────────────────────────────────────────
function startEngageTimer(quote) {
  clearTimeout(engageTimer);
  engageTimer = setTimeout(() => {
    gaEvent('quote_engaged', {
      quote_id:    quote.id,
      author:      quote.author,
      destination: quote.destinationSlug || null,
      language:    currentLang,
    });
  }, ENGAGED_MS);
}

// ── Render quote content (no transition) ──────────────────────────────────────
function renderQuoteContent(quote, fireGA) {
  textEl.textContent   = getTranslation(quote, currentLang);
  authorEl.textContent = quote.author;

  if (quote.destination && quote.destinationSlug) {
    const label = DEST_LABELS[quote.destinationSlug] || quote.destination;
    const url   = buildTripUrl(`quote_${quote.destinationSlug}`);
    ctaEl.href        = url;
    ctaEl.textContent = getCtaText(CTA_DESTINATION, { destination: label });
    ctaEl.dataset.ctaType = 'destination';
    ctaEl.style.display = '';
  } else {
    ctaEl.href        = buildTripUrl('quote_widget_cta');
    ctaEl.textContent = getCtaText(CTA_FOOTER);
    ctaEl.dataset.ctaType = 'footer';
    ctaEl.style.display = '';
  }

  if (fireGA) {
    gaEvent('quote_view', {
      quote_id:    quote.id,
      author:      quote.author,
      destination: quote.destinationSlug || null,
      language:    currentLang,
    });
  }
}

// ── Transition to a quote ─────────────────────────────────────────────────────
function goTo(index, manual) {
  if (isFading) return;
  isFading = true;

  stopAutoRotation();
  clearTimeout(engageTimer);
  resetTimerBar();

  // Fade out
  card.classList.remove('fade-in');
  card.classList.add('fade-out');

  setTimeout(() => {
    currentIndex = ((index % QUOTES.length) + QUOTES.length) % QUOTES.length;
    const quote  = QUOTES[currentIndex];

    renderQuoteContent(quote, true);
    updateDots();

    // Fade in
    card.classList.remove('fade-out');
    card.classList.add('fade-in');

    isFading = false;

    startEngageTimer(quote);
    startAutoRotation();
    startTimerBar();
  }, 620); // slightly longer than CSS transition
}

function advance(dir) {
  goTo(currentIndex + dir, false);
}

// ── CTA click GA + just-in-time URL rebuild ───────────────────────────────────
ctaEl.addEventListener('click', (e) => {
  e.stopPropagation(); // don't trigger stage click
  const quote = QUOTES[currentIndex];

  // Rebuild URL at click time so it always reflects the CURRENT language,
  // regardless of which language was active when the quote was rendered.
  if (quote.destination && quote.destinationSlug) {
    ctaEl.href = buildTripUrl(`quote_${quote.destinationSlug}`);
  } else {
    ctaEl.href = buildTripUrl('quote_widget_cta');
  }

  gaEvent('quote_cta_click', {
    quote_id:    quote.id,
    destination: quote.destinationSlug || null,
    cta_type:    ctaEl.dataset.ctaType || 'footer',
    language:    currentLang,
  });
});

// ── Stage click = next ────────────────────────────────────────────────────────
stage.addEventListener('click', (e) => {
  if (e.target === ctaEl || ctaEl.contains(e.target)) return;
  advance(1);
});

// ── Arrow buttons ─────────────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', (e) => {
  e.stopPropagation();
  advance(-1);
});
document.getElementById('btn-next').addEventListener('click', (e) => {
  e.stopPropagation();
  advance(1);
});

// ── Pause on hover ────────────────────────────────────────────────────────────
widgetEl.addEventListener('mouseenter', () => { isPaused = true; });
widgetEl.addEventListener('mouseleave', () => { isPaused = false; });

// ── Language bar clicks ───────────────────────────────────────────────────────
langBar.addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  e.stopPropagation();
  setLanguage(btn.dataset.lang, true);
});

// ── Init ──────────────────────────────────────────────────────────────────────
try {
  // Restore language from localStorage
  try {
    const saved = localStorage.getItem(LS_LANG_KEY);
    if (saved && ['en','es','fr','ja','zh','ko'].includes(saved)) {
      currentLang = saved;
      langBar.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
    }
  } catch(_) {}

  // Register GA4 custom dimensions
  if (window.gtag) {
    gtag('event', 'widget_view', { widget: 'quote' });
    gtag('set', { 'widget': 'quote' });
  }

  // Build UI
  buildDots();

  // Show initial random quote (already set in state)
  const initQuote = QUOTES[currentIndex];
  renderQuoteContent(initQuote, true);
  card.classList.add('fade-in');

  startEngageTimer(initQuote);
  startAutoRotation();
  startTimerBar();

} catch(err) {
  showFallback();
}
</script>
