<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="widget-version" content="1.2.0">
<title>Widget unavailable</title>
<link rel="stylesheet" href="assets/tokens.css">
<style>
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: transparent; }
  .offline-wrap {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 24px; text-align: center; gap: 12px;
  }
</style>
</head>
<body>
<div class="card offline-wrap">
  <div class="grain"></div>
  <div class="caps" style="color:var(--text-faint)">Widget unavailable</div>
  <div class="serif" style="font-size:26px">Widget unavailable</div>
  <p style="color:var(--text-dim);font-size:13px;max-width:320px;margin:0;line-height:1.55">
    We couldn't reach the data source. This usually means the viewer's internet is offline,
    or an extension is blocking the request. The rest of this page should still work.
  </p>
  <div class="caps mono" style="color:var(--text-faint);font-size:9px" id="err-code">?code=no-connection</div>
  <button onclick="location.reload()" class="btn-ghost" style="margin-top:4px">Try again</button>
</div>

<script>
  const code = new URLSearchParams(location.search).get("code") || "no-connection";
  document.getElementById("err-code").textContent = "?code=" + code;
</script>
</body>
</html>
