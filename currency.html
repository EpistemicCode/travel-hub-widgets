<!--
  currency.html — Wise Currency Comparison Widget · v1.1.0
  Embeds cleanly in Notion. Uses Wise JS-injected comparison widget (not iframe).
  Shows Wise vs other providers — real mid-market rate, all fees visible.

  !! AFFILIATE CODE — swap before launch !!
  data-affiliate-link on .tw-comparison anchor uses code "EPISTEMIC"
  Replace "EPISTEMIC" in AFFILIATE_CODE const below with your real Wise referral code.
-->

<title>Currency Comparison</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start:       #0d1117;
    --bg-end:         #0f1114;
    --card:           #1a1e24;
    --line:           rgba(255,255,255,0.07);
    --text:           #ededea;
    --text-dim:       #9a9a94;
    --text-faint:     #646460;
    --accent:         #d4af9a;
    --accent-soft:    rgba(212,175,154,0.12);
    --accent-line:    rgba(212,175,154,0.3);
    --accent-glow:    rgba(212,175,154,0.08);
    --glyph:          rgba(212,175,154,0.18);
    --pink:           #c97a6a;
    --font-serif:     "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --font-ui:        system-ui, -apple-system, sans-serif;
    --radius:         10px;
    --transition:     300ms ease;
  }

  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    overflow-x: hidden;
    overflow-y: auto;
    background: transparent;
    color: var(--text);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Grain overlay (matches quote.html) ── */
  .grain {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
    z-index: 0;
  }

  /* ── Widget shell ── */
  .currency-widget {
    min-height: 100vh;
    display: flex; flex-direction: column;
    background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }

  /* ── Language pill row (exact quote.html pattern) ── */
  .lang-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: flex-end; align-items: center;
    padding: 10px 14px 0;
    gap: 2px;
    flex-shrink: 0;
  }
  .lang-btn {
    background: none; border: none; border-radius: 20px;
    padding: 3px 8px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lang-btn:hover { color: var(--text-dim); background: rgba(255,255,255,0.05); }
  .lang-btn.active {
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ── Header row ── */
  .widget-header {
    position: relative; z-index: 5;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 18px 0;
    flex-shrink: 0;
  }
  .header-dash {
    display: inline-block;
    width: 18px; height: 1px;
    background: var(--pink);
    flex-shrink: 0;
  }
  .header-title {
    font-family: var(--font-ui);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim);
    font-variant: small-caps;
  }

  /* ── Subtitle ── */
  .widget-subtitle {
    position: relative; z-index: 5;
    padding: 4px 18px 0;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13px;
    color: var(--text-faint);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }

  /* ── Chip row ── */
  .chip-row {
    position: relative; z-index: 5;
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 16px 6px;
    flex-shrink: 0;
  }
  .chip {
    background: none;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 4px 10px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 0.08em;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, box-shadow 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .chip:hover {
    border-color: var(--accent-line);
    color: var(--text);
    background: var(--accent-glow);
  }
  .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* ── Amount pill row ── */
  .amount-row {
    position: relative; z-index: 5;
    display: flex; align-items: center; gap: 6px;
    padding: 0 16px 8px;
    flex-shrink: 0;
  }
  .amount-label {
    font-family: var(--font-ui);
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
    margin-right: 2px;
    flex-shrink: 0;
  }
  .amount-chip {
    background: none;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 3px 9px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 0.05em;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .amount-chip:hover {
    border-color: var(--accent-line);
    color: var(--text);
    background: var(--accent-glow);
  }
  .amount-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ── Wise comparison widget container ── */
  .wise-wrap {
    position: relative; z-index: 5;
    flex: 1;
    padding: 6px 16px 0;
    min-width: 0;
  }

  /* Wise injects a div wrapping the anchor — let it fill width */
  .wise-wrap > div,
  #wise-compare-container {
    width: 100%;
    min-width: 480px;
  }

  /* Override Wise widget to respect dark bg where possible */
  #wise-compare-container a.tw-comparison {
    display: none; /* hidden while loading — Wise replaces it */
  }

  /* ── Language fallback note (ja/zh/ko) ── */
  .lang-fallback-note {
    display: none;
    position: relative; z-index: 5;
    padding: 6px 18px 2px;
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    font-style: italic;
    flex-shrink: 0;
  }
  .lang-fallback-note.visible {
    display: block;
  }

  /* ── Fallback error message ── */
  .wise-fallback {
    display: none;
    padding: 32px 20px;
    text-align: center;
  }
  .wise-fallback.visible {
    display: block;
  }
  .wise-fallback-title {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .wise-fallback-link {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── Footer CTA ── */
  .widget-footer {
    position: relative; z-index: 10;
    display: flex; justify-content: center; align-items: center;
    padding: 12px 16px 12px;
    flex-shrink: 0;
  }
  .footer-cta {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
    opacity: 0.85;
    transition: opacity 0.2s;
    display: inline-block;
  }
  .footer-cta:hover {
    opacity: 1;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .chip { font-size: 9px; padding: 3px 8px; }
    .wise-wrap > div,
    #wise-compare-container { min-width: 320px; }
  }
  @media (min-width: 600px) {
    .chip-row { gap: 7px; }
  }
</style>
</head>

<div class="currency-widget" id="widget">
  <div class="grain"></div>

  <!-- Language selector (matches quote.html) -->
  <div class="lang-bar" id="lang-bar">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>

    <button class="lang-btn" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="ko">한국어</button>
  </div>

  <!-- Header: dash + small caps title -->
  <div class="widget-header">
    <span class="header-dash"></span>
    <span class="header-title">Currency</span>
  </div>

  <!-- Subtitle (serif italic, muted) -->
  <div class="widget-subtitle" id="subtitle">Compare Wise vs other providers &mdash; real cost, real rates</div>

  <!-- Quick-pick chip row -->
  <div class="chip-row" id="chip-row">
    <button class="chip active" data-from="USD" data-to="EUR">USD → EUR</button>

         id="wise-compare-anchor"
         href="https://wise.com/gb/compare/?sendAmount=1000&sourceCurrency=USD&targetCurrency=EUR"
         data-lang="en"
         data-max-visible-providers="3"
         data-affiliate-link="https://wise.com/invite/dic/EPISTEMIC?utm_source=travel-hub&utm_medium=widget&utm_campaign=currency_compare">
        The true cost of sending USD to EUR

    <!-- Fallback shown if Wise script fails to load -->
    <div class="wise-fallback" id="wise-fallback" role="alert">
      <div class="wise-fallback-title">Currency comparison unavailable &mdash; check your connection.</div>
      <a class="wise-fallback-link" href="https://wise.com/compare/" target="_blank" rel="noopener noreferrer">
        Open Wise Compare &rarr;
      </a>

  <!-- Footer CTA -->
  <div class="widget-footer">
    <a class="footer-cta" id="footer-cta"
       href="https://wise.com/invite/dic/EPISTEMIC?utm_source=travel-hub&utm_medium=widget&utm_campaign=currency_compare"
       target="_blank" rel="noopener noreferrer sponsored">
      &#x2726; Send money abroad with Wise &rarr;
    </a>
  </div>
</div>

<script>
// ── Error boundary ─────────────────────────────────────────────────────────────
window.addEventListener('error', (e) => {
  if (e.error) showFallback('script');
});
window.addEventListener('unhandledrejection', (e) => {
  const msg = String(e.reason && (e.reason.message || e.reason));
  if (/fetch|network|failed|abort/i.test(msg)) showFallback('network');
});

function showFallback(code) {
  try {
    document.getElementById('widget').innerHTML = `
      <div class="grain"></div>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;
           justify-content:center;align-items:center;padding:32px;text-align:center;gap:12px;">
        <div style="font-family:var(--font-ui);font-size:10px;letter-spacing:0.14em;
             text-transform:uppercase;color:var(--text-faint)">Widget unavailable</div>
        <div style="font-family:var(--font-serif);font-style:italic;font-size:20px;color:var(--text)">
          Currency comparison unavailable \u2014 check your connection.
        </div>
        <a href="https://wise.com/compare/" target="_blank" rel="noopener noreferrer"
           style="font-family:var(--font-ui);font-size:12px;color:var(--accent);text-decoration:underline">
          Open Wise Compare \u2192
        </a>
        <div style="font-size:11px;color:var(--text-faint);font-family:var(--font-ui)">code \u00b7 ${code || 'unknown'}</div>
      </div>`;
  } catch(_) {}
}

// ── Config ─────────────────────────────────────────────────────────────────────
// !! SWAP THIS before launch — replace EPISTEMIC with your real Wise referral code !!
const AFFILIATE_CODE = 'EPISTEMIC';
const AFFILIATE_BASE = `https://wise.com/invite/dic/${AFFILIATE_CODE}?utm_source=travel-hub&utm_medium=widget&utm_campaign=currency_compare`;

// LocalStorage keys
const LS_LANG_KEY   = 'quote-lang';      // shared with quote.html so language syncs
const LS_PAIR_KEY   = 'currency-pair';   // persist last selected pair
const LS_AMOUNT_KEY = 'currency-amount'; // persist last selected amount

// Wise compare lang mapping (widget only supports en/es/pt/fr/de/ru)
const WISE_LANG_MAP = {
  en: 'en',
  es: 'es',
  fr: 'fr',
  ja: 'en', // fallback to English; our chrome stays in Japanese
  zh: 'en', // fallback to English; our chrome stays in Chinese
  ko: 'en', // fallback to English; our chrome stays in Korean
};
const LANG_NEEDS_FALLBACK_NOTE = new Set(['ja', 'zh', 'ko']);

// ── Strings (all 6 languages) ──────────────────────────────────────────────────
const STRINGS = {
  subtitle: {
    en: 'Compare Wise vs other providers \u2014 real cost, real rates',
    es: 'Compara Wise con otros servicios \u2014 costo real, tipos reales',
    fr: 'Comparez Wise aux autres services \u2014 co\u00fbts r\u00e9els, taux r\u00e9els',
    ja: 'Wise\u3068\u4ed6\u793e\u3092\u6bd4\u8f03 \u2014 \u5b9f\u969b\u306e\u30b3\u30b9\u30c8\u3068\u30ec\u30fc\u30c8',
    zh: 'Wise vs \u5176\u4ed6\u5e73\u53f0 \u2014 \u771f\u5b9e\u8d39\u7528\uff0c\u771f\u5b9e\u6c47\u7387',
    ko: 'Wise vs \ub2e4\ub978 \uc11c\ube44\uc2a4 \u2014 \uc2e4\uc81c \ube44\uc6a9, \uc2e4\uc81c \ud658\uc728',
  },
  cta: {
    en: '\u2726 Send money abroad with Wise \u2192',
    es: '\u2726 Env\u00eda dinero al extranjero con Wise \u2192',
    fr: '\u2726 Envoyez de l\u2019argent \u00e0 l\u2019\u00e9tranger avec Wise \u2192',
    ja: '\u2726 Wise\u3067\u6d77\u5916\u9001\u91d1 \u2192',
    zh: '\u2726 \u7528 Wise \u8de8\u5883\u6c47\u6b3e \u2192',
    ko: '\u2726 Wise\ub85c \ud574\uc678\uc1a1\uae08 \u2192',
  },
  amountLabel: {
    en: 'Amount',
    es: 'Importe',
    fr: 'Montant',
    ja: '\u91d1\u984d',
    zh: '\u91d1\u989d',
    ko: '\u ae08\uc561',
  },
  langFallbackNote: {
    ja: '\u6bd4\u8f03\u8868\u306f\u82f1\u8a9e\u3067\u8868\u793a\u3055\u308c\u307e\u3059',
    zh: '\u6bd4\u8f83\u8868\u4ee5\u82f1\u6587\u663e\u793a',
    ko: '\ube44\uad50\ud45c\ub294 \uc601\uc5b4\ub85c \ud45c\uc2dc\ub429\ub2c8\ub2e4',
  },
};

// ── State ──────────────────────────────────────────────────────────────────────
let currentLang   = 'en';
let currentFrom   = 'USD';
let currentTo     = 'EUR';
let currentAmount = 1000;
let wiseScriptLoading = false;

// ── DOM refs ───────────────────────────────────────────────────────────────────
const langBar         = document.getElementById('lang-bar');
const chipRow         = document.getElementById('chip-row');
const amountRow       = document.getElementById('amount-row');
const subtitleEl      = document.getElementById('subtitle');
const amountLabelEl   = document.getElementById('amount-label');
const footerCta       = document.getElementById('footer-cta');
const wiseContainer   = document.getElementById('wise-compare-container');
const wiseFallback    = document.getElementById('wise-fallback');
const langFallbackNote = document.getElementById('lang-fallback-note');

// ── GA4 helper ─────────────────────────────────────────────────────────────────
function gaEvent(name, params) {
  if (window.gtag) {
    gtag('event', name, Object.assign({ widget: 'currency' }, params));
  }
}

// ── Build Wise compare href ────────────────────────────────────────────────────
function buildWiseHref(from, to, amount, wiseLang) {
  // Wise compare URL uses gb as default locale base
  return `https://wise.com/gb/compare/?sendAmount=${amount}&sourceCurrency=${from}&targetCurrency=${to}`;
}

// ── Render strings ─────────────────────────────────────────────────────────────
function renderStrings() {
  subtitleEl.textContent     = STRINGS.subtitle[currentLang]    || STRINGS.subtitle.en;
  footerCta.textContent      = STRINGS.cta[currentLang]         || STRINGS.cta.en;
  amountLabelEl.textContent  = STRINGS.amountLabel[currentLang] || STRINGS.amountLabel.en;

  // Language fallback note for ja/zh/ko
  if (LANG_NEEDS_FALLBACK_NOTE.has(currentLang)) {
    langFallbackNote.textContent = STRINGS.langFallbackNote[currentLang] || '';
    langFallbackNote.classList.add('visible');
  } else {
    langFallbackNote.classList.remove('visible');
    langFallbackNote.textContent = '';
  }
}

// ── Wise widget render / re-render ─────────────────────────────────────────────
//
// Strategy: DOM swap + script re-inject.
// Wise widgets.js renders once on load by scanning for .tw-comparison anchors.
// To re-render with new params:
//   1. Remove the existing Wise script tag (by id "transferwise-wjs")
//   2. Clear any rendered output from the container (Wise wraps anchor in divs)
//   3. Insert a fresh <a class="tw-comparison"> with updated data attrs
//   4. Re-inject widgets.js — it re-scans and renders again
//
// If script inject fails (onerror), shows fallback message.

function buildAnchorHtml(from, to, amount, wiseLang) {
  const href = buildWiseHref(from, to, amount, wiseLang);
  return `<a class="tw-comparison"
     id="wise-compare-anchor"
     href="${href}"
     data-lang="${wiseLang}"
     data-max-visible-providers="3"
     data-affiliate-link="${AFFILIATE_BASE}">The true cost of sending ${from} to ${to}</a>`;
}

function injectWiseScript() {
  return new Promise((resolve, reject) => {
    try {
      // Remove any prior script tag
      const old = document.getElementById('transferwise-wjs');
      if (old) old.parentNode.removeChild(old);

      const js = document.createElement('script');
      js.id  = 'transferwise-wjs';
      js.src = 'https://widgets.wise.com/widgets.js';

      js.onload  = () => resolve();
      js.onerror = () => reject(new Error('Wise script failed to load'));

      const fjs = document.getElementsByTagName('script')[0];
      fjs.parentNode.insertBefore(js, fjs);
    } catch (err) {
      reject(err);
    }
  });
}

function renderWiseWidget() {
  try {
    const wiseLang = WISE_LANG_MAP[currentLang] || 'en';

    // 1. Reset container — remove any previously rendered Wise output
    wiseContainer.innerHTML = buildAnchorHtml(currentFrom, currentTo, currentAmount, wiseLang);

    // 2. Re-inject Wise script
    wiseScriptLoading = true;
    injectWiseScript()
      .then(() => {
        wiseScriptLoading = false;
        wiseFallback.classList.remove('visible');
      })
      .catch((err) => {
        wiseScriptLoading = false;
        console.warn('[currency widget] Wise script error:', err);
        wiseContainer.innerHTML = '';
        wiseFallback.classList.add('visible');
      });

  } catch (err) {
    console.warn('[currency widget] renderWiseWidget error:', err);
    wiseFallback.classList.add('visible');
  }
}

// ── Chip selection ─────────────────────────────────────────────────────────────
function selectChip(chipEl) {
  chipRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');

  currentFrom = chipEl.dataset.from;
  currentTo   = chipEl.dataset.to;

  try { localStorage.setItem(LS_PAIR_KEY, JSON.stringify({ from: currentFrom, to: currentTo })); } catch(_) {}

  renderWiseWidget();
}

// ── Amount selection ───────────────────────────────────────────────────────────
function selectAmount(amountChipEl) {
  amountRow.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
  amountChipEl.classList.add('active');

  currentAmount = parseInt(amountChipEl.dataset.amount, 10);
  try { localStorage.setItem(LS_AMOUNT_KEY, String(currentAmount)); } catch(_) {}

  renderWiseWidget();
}

// ── Language switch ────────────────────────────────────────────────────────────
function setLanguage(lang, fromChange) {
  const prev = currentLang;
  currentLang = lang;
  try { localStorage.setItem('quote-lang', lang); } catch(_) {}

  langBar.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  renderStrings();

  // Re-render Wise widget with new language mapping
  renderWiseWidget();

  if (fromChange && prev !== lang) {
    gaEvent('language_change', { from: prev, to: lang });
  }
}

// ── Event handlers ─────────────────────────────────────────────────────────────
chipRow.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  if (chip.classList.contains('active')) return;

  const from = chip.dataset.from;
  const to   = chip.dataset.to;

  selectChip(chip);

  gaEvent('currency_pair_change', {
    from_currency: from,
    to_currency:   to,
    amount:        currentAmount,
    language:      currentLang,
  });
});

amountRow.addEventListener('click', (e) => {
  const chip = e.target.closest('.amount-chip');
  if (!chip) return;
  if (chip.classList.contains('active')) return;

  const amount = parseInt(chip.dataset.amount, 10);

  selectAmount(chip);

  gaEvent('currency_amount_change', {
    from_currency: currentFrom,
    to_currency:   currentTo,
    amount:        amount,
    language:      currentLang,
  });
});

langBar.addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  setLanguage(btn.dataset.lang, true);
});

footerCta.addEventListener('click', () => {
  gaEvent('currency_cta_click', {
    from_currency: currentFrom,
    to_currency:   currentTo,
    amount:        currentAmount,
    language:      currentLang,
  });
});

// ── Init ───────────────────────────────────────────────────────────────────────
try {
  // 1. Restore language (shared key with quote.html)
  try {
    const savedLang = localStorage.getItem('quote-lang');
    if (savedLang && ['en','es','fr','ja','zh','ko'].includes(savedLang)) {
      currentLang = savedLang;
      langBar.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
    }
  } catch(_) {}

  // 2. Restore saved amount
  try {
    const savedAmount = localStorage.getItem(LS_AMOUNT_KEY);
    if (savedAmount) {
      const parsed = parseInt(savedAmount, 10);
      if ([100, 500, 1000, 5000].includes(parsed)) {
        currentAmount = parsed;
        amountRow.querySelectorAll('.amount-chip').forEach(chip => {
          const isActive = parseInt(chip.dataset.amount, 10) === currentAmount;
          chip.classList.toggle('active', isActive);
        });
      }
    }
  } catch(_) {}

  // 3. Restore last currency pair
  let restoredChip = null;
  try {
    const savedPair = localStorage.getItem(LS_PAIR_KEY);
    if (savedPair) {
      const { from, to } = JSON.parse(savedPair);
      if (from && to) {
        currentFrom = from;
        currentTo   = to;
        chipRow.querySelectorAll('.chip').forEach(chip => {
          if (chip.dataset.from === from && chip.dataset.to === to) {
            restoredChip = chip;
          }
        });
      }
    }
  } catch(_) {}

  // 4. Mark active chip
  if (restoredChip) {
    chipRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    restoredChip.classList.add('active');
  }

  // 5. Render strings
  renderStrings();

  // 6. Update footer CTA href with affiliate link
  footerCta.href = AFFILIATE_BASE;

  // 7. Initial Wise widget render (called via window.onload to ensure DOM ready)
  window.onload = (function(d, s, id) {
    var js, fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) return;
    js = d.createElement(s); js.id = id;
    js.src = 'https://widgets.wise.com/widgets.js';
    js.onerror = function() {
      wiseContainer.innerHTML = '';
      wiseFallback.classList.add('visible');
    };
    fjs.parentNode.insertBefore(js, fjs);
  }(document, 'script', 'transferwise-wjs'));

  // Update the initial anchor to match restored state (before script loads)
  const wiseLangInit = WISE_LANG_MAP[currentLang] || 'en';
  wiseContainer.innerHTML = buildAnchorHtml(currentFrom, currentTo, currentAmount, wiseLangInit);

  // 8. GA4 widget_view
  gaEvent('widget_view', { widget: 'currency', language: currentLang });

} catch(err) {
  showFallback('init');
}
</script>
</body>
</html>
