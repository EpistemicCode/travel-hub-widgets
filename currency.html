<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start:       #0d1117;
    --bg-end:         #0f1114;
    --card:           #1a1e24;
    --line:           rgba(255,255,255,0.07);
    --text:           #ededea;
    --text-dim:       #9a9a94;
    --text-faint:     #646460;
    --accent:         #d4af9a;
    --accent-soft:    rgba(212,175,154,0.12);
    --accent-line:    rgba(212,175,154,0.3);
    --accent-glow:    rgba(212,175,154,0.08);
    --glyph:          rgba(212,175,154,0.18);
    --pink:           #c97a6a;
    --font-serif:     "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --font-ui:        system-ui, -apple-system, sans-serif;
    --radius:         10px;
    --transition:     300ms ease;
  }

  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    overflow: hidden;
    background: transparent;
    color: var(--text);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Grain overlay (matches quote.html) ── */
  .grain {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
    z-index: 0;
  }

  /* ── Widget shell — iframe-safe fixed shell (v1.0.0 layout) ── */
  .currency-widget {
    position: absolute; inset: 0;
    overflow: hidden;
    display: flex; flex-direction: column;
    background: #2F3438;
  }

  /* ── Language pill row (exact quote.html pattern) ── */
  .lang-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: flex-end; align-items: center;
    padding: 10px 14px 0;
    gap: 2px;
    flex-shrink: 0;
  }
  .lang-btn {
    background: none; border: none; border-radius: 20px;
    padding: 3px 8px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lang-btn:hover { color: var(--text-dim); background: rgba(255,255,255,0.05); }
  .lang-btn.active {
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ── Header row ── */
  .widget-header {
    position: relative; z-index: 5;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 18px 0;
    flex-shrink: 0;
  }
  .header-dash {
    display: inline-block;
    width: 18px; height: 1px;
    background: var(--pink);
    flex-shrink: 0;
  }
  .header-title {
    font-family: var(--font-ui);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim);
    font-variant: small-caps;
  }

  /* ── Subtitle ── */
  .widget-subtitle {
    position: relative; z-index: 5;
    padding: 4px 18px 0;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13px;
    color: var(--text-faint);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }

  /* ── Chip row ── */
  .chip-row {
    position: relative; z-index: 5;
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 16px 6px;
    flex-shrink: 0;
  }
  .chip {
    background: none;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 4px 10px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 0.08em;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, box-shadow 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .chip:hover {
    border-color: var(--accent-line);
    color: var(--text);
    background: var(--accent-glow);
  }
  .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* ── Amount pill row ── */
  .amount-row {
    position: relative; z-index: 5;
    display: flex; align-items: center; gap: 6px;
    padding: 0 16px 8px;
    flex-shrink: 0;
  }
  .amount-label {
    font-family: var(--font-ui);
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
    margin-right: 2px;
    flex-shrink: 0;
  }
  .amount-chip {
    background: none;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 3px 9px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 0.05em;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .amount-chip:hover {
    border-color: var(--accent-line);
    color: var(--text);
    background: var(--accent-glow);
  }
  .amount-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ── Wise iframe wrap ── */
  .wise-wrap {
    position: relative; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    padding: 4px 16px 0;
    flex-shrink: 0;
  }

  .wise-iframe {
    width: 340px; height: 490px;
    border: none;
    display: block;
    opacity: 1;
    transition: opacity var(--transition);
    border-radius: 6px;
  }
  .wise-iframe.fading { opacity: 0.4; }

  /* ── Compare CTA (deep-link, distinct from footer referral CTA) ── */
  .compare-cta {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 10px 0 0;
    padding: 10px 14px;
    text-align: center;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--accent);
    background: transparent;
    border: 1px solid rgba(212,175,154,0.35);
    border-radius: 6px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .compare-cta:hover {
    background: rgba(212,175,154,0.08);
    border-color: rgba(212,175,154,0.65);
  }

  /* ── Fallback error message ── */
  .wise-fallback {
    display: none;
    padding: 32px 20px;
    text-align: center;
    width: 340px;
  }
  .wise-fallback.visible { display: block; }
  .wise-fallback-title {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .wise-fallback-link {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── Footer CTA — referral (send money), visually distinct from compare CTA) ── */
  .widget-footer {
    position: relative; z-index: 10;
    display: flex; justify-content: center; align-items: center;
    padding: 10px 16px 12px;
    flex-shrink: 0;
    margin-top: auto;
  }
  .footer-cta {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
    opacity: 0.85;
    transition: opacity 0.2s;
    display: inline-block;
  }
  .footer-cta:hover {
    opacity: 1;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .chip { font-size: 9px; padding: 3px 8px; }
    .wise-iframe { width: 300px; }
    .compare-cta { max-width: 300px; }
  }
  @media (min-width: 600px) {
    .chip-row { gap: 7px; }
  }
</style>
</head>
<body>

<div class="currency-widget" id="widget">
  <div class="grain"></div>

  <!-- Language selector (matches quote.html) -->
  <div class="lang-bar" id="lang-bar">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>

  <div class="widget-header">

  <!-- Subtitle (serif italic, muted) -->

    <button class="amount-chip active" data-amount="1000">1 000</button>
    <button class="amount-chip" data-amount="5000">5 000</button>

  <!-- Wise iframe converter + Compare CTA -->
  <div class="wise-wrap" id="wise-wrap">
    <iframe
      id="wise-iframe"
      class="wise-iframe"
      title="Wise FX"
      src="https://wise.com/gb/currency-converter/fx-widget/converter?sourceCurrency=USD&targetCurrency=EUR&ctaVariant=CONVERT&ctaLink=https%3A%2F%2Fwise.prf.hn%2Fclick%2Fcamref%3A1110lELMy%2Fpubref%3AIframeCTA"
      width="340" height="490"
      frameborder="0"
      allowtransparency="true"
      loading="lazy">
    </iframe>

    <!-- Fallback shown if iframe fails (5s health check) -->
    <div class="wise-fallback" id="wise-fallback" role="alert">
      <div class="wise-fallback-title">Converter unavailable &mdash; check your connection.</div>
      <a class="wise-fallback-link" href="https://wise.com/currency-converter/" target="_blank" rel="noopener noreferrer">
        Open Wise Converter &rarr;
      </a>
    </div>

    <!-- Compare CTA — deep-link to wise.com/compare (NOT the referral signup) -->
    <a class="compare-cta" id="compare-cta" href="#" target="_blank" rel="noopener">
      &#x21c4; Compare with other providers &rarr;
    </a>
  </div>

  <!-- Footer CTA — referral link (send money signup) -->
  <div class="widget-footer">
    <a class="footer-cta" id="footer-cta"
       href="https://wise.prf.hn/click/camref:1110lELMy/pubref:CurrencyWidget"
       target="_blank" rel="noopener noreferrer sponsored">
      &#x2726; Send money abroad with Wise &rarr;
    </a>
  </div>
</div>

<script>
// ── Error boundary ─────────────────────────────────────────────────────────────
window.addEventListener('error', (e) => {
  if (e.error) showFallback('script');
});
window.addEventListener('unhandledrejection', (e) => {
  const msg = String(e.reason && (e.reason.message || e.reason));
  if (/fetch|network|failed|abort/i.test(msg)) showFallback('network');
});

function showFallback(code) {
  try {
    document.getElementById('widget').innerHTML = `
      <div class="grain"></div>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;
           justify-content:center;align-items:center;padding:32px;text-align:center;gap:12px;">
        <div style="font-family:var(--font-ui);font-size:10px;letter-spacing:0.14em;
             text-transform:uppercase;color:var(--text-faint)">Widget unavailable</div>
        <div style="font-family:var(--font-serif);font-style:italic;font-size:20px;color:var(--text)">
          Converter unavailable \u2014 check your connection.
        </div>
        <a href="https://wise.com/currency-converter/" target="_blank" rel="noopener noreferrer"
           style="font-family:var(--font-ui);font-size:12px;color:var(--accent);text-decoration:underline">
          Open Wise Converter \u2192
        </a>
        <div style="font-size:11px;color:var(--text-faint);font-family:var(--font-ui)">code \u00b7 ${code || 'unknown'}</div>
      </div>`;
  } catch(_) {}
}

// ── Config ─────────────────────────────────────────────────────────────────────
// Wise affiliate via Partnerize. pubref distinguishes traffic sources for revenue attribution.
const AFFILIATE_CAMREF = '1110lELMy';
const AFFILIATE_BASE = `https://wise.prf.hn/click/camref:${AFFILIATE_CAMREF}/pubref:CurrencyWidget`;

// LocalStorage keys
const LS_LANG_KEY   = 'quote-lang';      // shared with quote.html so language syncs
const LS_PAIR_KEY   = 'currency-pair';   // persist last selected pair
const LS_AMOUNT_KEY = 'currency-amount'; // persist last selected amount

// Wise iframe locale paths
// en→gb, es→es, fr→fr, ja→jp, zh→hk, ko→kr
const WISE_LOCALE_MAP = {
  en: 'gb',
  es: 'es',
  fr: 'fr',
  ja: 'jp',
  zh: 'hk',
  ko: 'kr',
};

// ── Strings (all 6 languages) ──────────────────────────────────────────────────
const STRINGS = {
  subtitle: {
    en: 'Live mid-market rates by Wise \u2014 what you\u2019d actually pay',
    es: 'Tipos en vivo por Wise \u2014 lo que realmente pagar\u00edas',
    fr: 'Taux en direct par Wise \u2014 ce que vous paieriez vraiment',
    ja: 'Wise\u306e\u30ea\u30a2\u30eb\u30bf\u30a4\u30e0\u70ba\u66ff \u2014 \u5b9f\u969b\u306b\u652f\u6255\u3046\u91d1\u984d',
    zh: 'Wise \u5b9e\u65f6\u6c47\u7387 \u2014 \u4f60\u5b9e\u9645\u652f\u4ed8\u7684\u4ef7\u683c',
    ko: 'Wise \uc2e4\uc2dc\uac04 \ud658\uc728 \u2014 \uc2e4\uc81c\ub85c \uc9c0\ubd88\ud558\ub294 \uae08\uc561',
  },
  compareCta: {
    en: '\u21c4 Compare with other providers \u2192',
    es: '\u21c4 Comparar con otros servicios \u2192',
    fr: '\u21c4 Comparer avec d\u2019autres services \u2192',
    ja: '\u21c4 \u4ed6\u793e\u3068\u6bd4\u8f03\u3059\u308b \u2192',
    zh: '\u21c4 \u4e0e\u5176\u4ed6\u5e73\u53f0\u6bd4\u8f03 \u2192',
    ko: '\u21c4 \ub2e4\ub978 \uc11c\ube44\uc2a4\uc640 \ube44\uad50 \u2192',
  },
  cta: {
    en: '\u2726 Send money abroad with Wise \u2192',
    es: '\u2726 Env\u00eda dinero al extranjero con Wise \u2192',
    fr: '\u2726 Envoyez de l\u2019argent \u00e0 l\u2019\u00e9tranger avec Wise \u2192',
    ja: '\u2726 Wise\u3067\u6d77\u5916\u9001\u91d1 \u2192',
    zh: '\u2726 \u7528 Wise \u8de8\u5883\u6c47\u6b3e \u2192',
    ko: '\u2726 Wise\ub85c \ud574\uc678\uc1a1\uae08 \u2192',
  },
  amountLabel: {
    en: 'Amount',
    es: 'Importe',
    fr: 'Montant',
    ja: '\u91d1\u984d',
    zh: '\u91d1\u989d',
    ko: '\uae08\uc561',
  },
};

// ── State ──────────────────────────────────────────────────────────────────────
let currentLang   = 'en';
let currentFrom   = 'USD';
let currentTo     = 'EUR';
let currentAmount = 1000;

// ── DOM refs ───────────────────────────────────────────────────────────────────
const langBar      = document.getElementById('lang-bar');
const chipRow      = document.getElementById('chip-row');
const amountRow    = document.getElementById('amount-row');
const subtitleEl   = document.getElementById('subtitle');
const amountLabelEl = document.getElementById('amount-label');
const footerCta    = document.getElementById('footer-cta');
const wiseIframe   = document.getElementById('wise-iframe');
const wiseFallback = document.getElementById('wise-fallback');
const compareCta   = document.getElementById('compare-cta');

// ── GA4 helper ─────────────────────────────────────────────────────────────────
function gaEvent(name, params) {
  if (window.gtag) {
    gtag('event', name, Object.assign({ widget: 'currency' }, params));
  }
}

// ── Build iframe src ───────────────────────────────────────────────────────────
// ctaLink routes the iframe's internal "Convert" CTA through Partnerize for affiliate
// tracking. pubref:IframeCTA distinguishes in-iframe clicks from footer-CTA clicks.
function buildIframeSrc(from, to, lang) {
  const locale = WISE_LOCALE_MAP[lang] || 'gb';
  const ctaLink = encodeURIComponent(`https://wise.prf.hn/click/camref:${AFFILIATE_CAMREF}/pubref:IframeCTA`);
  return `https://wise.com/${locale}/currency-converter/fx-widget/converter?sourceCurrency=${from}&targetCurrency=${to}&ctaVariant=CONVERT&ctaLink=${ctaLink}`;
}

// ── Build compare href (just-in-time — always fresh on click) ──────────────────
function buildCompareHref() {
  const locale = WISE_LOCALE_MAP[currentLang] || 'gb';
  return `https://wise.com/${locale}/compare/?sourceCurrency=${currentFrom}&targetCurrency=${currentTo}&sendAmount=${currentAmount}`;
}

// ── Render strings ─────────────────────────────────────────────────────────────
function renderStrings() {
  subtitleEl.textContent    = STRINGS.subtitle[currentLang]    || STRINGS.subtitle.en;
  compareCta.textContent    = STRINGS.compareCta[currentLang]  || STRINGS.compareCta.en;
  footerCta.textContent     = STRINGS.cta[currentLang]         || STRINGS.cta.en;
  amountLabelEl.textContent = STRINGS.amountLabel[currentLang] || STRINGS.amountLabel.en;
}

// ── Update iframe src with fade transition ─────────────────────────────────────
function updateIframe() {
  try {
    wiseIframe.classList.add('fading');
    setTimeout(() => {
      wiseIframe.src = buildIframeSrc(currentFrom, currentTo, currentLang);
      wiseIframe.classList.remove('fading');
    }, 300);
  } catch (err) {
    console.warn('[currency widget] updateIframe error:', err);
    wiseFallback.classList.add('visible');
  }
}

// ── 5s health check — if iframe never loaded show fallback ─────────────────────
let iframeHealthTimer = null;
function startIframeHealthCheck() {
  clearTimeout(iframeHealthTimer);
  iframeHealthTimer = setTimeout(() => {
    try {
      const doc = wiseIframe.contentDocument || wiseIframe.contentWindow.document;
      if (!doc || doc.readyState === 'loading') {
        wiseFallback.classList.add('visible');
      }
    } catch (_) {
      // cross-origin: we can't read contentDocument — this is expected and fine
      // If wise is loading cross-origin, it's actually working; suppress fallback
    }
  }, 5000);
}

wiseIframe.addEventListener('load', () => {
  clearTimeout(iframeHealthTimer);
  wiseFallback.classList.remove('visible');
});
wiseIframe.addEventListener('error', () => {
  wiseFallback.classList.add('visible');
});

// ── Chip selection ─────────────────────────────────────────────────────────────
function selectChip(chipEl) {
  chipRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  currentFrom = chipEl.dataset.from;
  currentTo   = chipEl.dataset.to;
  try { localStorage.setItem(LS_PAIR_KEY, JSON.stringify({ from: currentFrom, to: currentTo })); } catch(_) {}
  updateIframe();
}

// ── Amount selection ───────────────────────────────────────────────────────────
function selectAmount(amountChipEl) {
  amountRow.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
  amountChipEl.classList.add('active');
  currentAmount = parseInt(amountChipEl.dataset.amount, 10);
  try { localStorage.setItem(LS_AMOUNT_KEY, String(currentAmount)); } catch(_) {}
  // iframe doesn't use amount — no reload needed; compare href updates just-in-time
}

// ── Language switch ────────────────────────────────────────────────────────────
function setLanguage(lang, fromChange) {
  const prev = currentLang;
  currentLang = lang;
  try { localStorage.setItem('quote-lang', lang); } catch(_) {}
  langBar.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  renderStrings();
  updateIframe();
  if (fromChange && prev !== lang) {
    gaEvent('language_change', { from: prev, to: lang });
  }
}

// ── Event handlers ─────────────────────────────────────────────────────────────
chipRow.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip || chip.classList.contains('active')) return;
  const from = chip.dataset.from;
  const to   = chip.dataset.to;
  selectChip(chip);
  gaEvent('currency_pair_change', {
    from_currency: from,
    to_currency:   to,
    amount:        currentAmount,
    language:      currentLang,
  });
});

amountRow.addEventListener('click', (e) => {
  const chip = e.target.closest('.amount-chip');
  if (!chip || chip.classList.contains('active')) return;
  const amount = parseInt(chip.dataset.amount, 10);
  selectAmount(chip);
  gaEvent('currency_amount_change', {
    from_currency: currentFrom,
    to_currency:   currentTo,
    amount:        amount,
    language:      currentLang,
  });
});

langBar.addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  setLanguage(btn.dataset.lang, true);
});

footerCta.addEventListener('click', () => {
  gaEvent('currency_cta_click', {
    from_currency: currentFrom,
    to_currency:   currentTo,
    amount:        currentAmount,
    language:      currentLang,
  });
});

// Compare CTA — build href just-in-time, then fire GA4
compareCta.addEventListener('click', (e) => {
  compareCta.href = buildCompareHref();
  gaEvent('currency_compare_click', {
    from_currency: currentFrom,
    to_currency:   currentTo,
    amount:        currentAmount,
    language:      currentLang,
  });
});

// ── Init ───────────────────────────────────────────────────────────────────────
try {
  // 1. Restore language (shared key with quote.html)
  try {
    const savedLang = localStorage.getItem('quote-lang');
    if (savedLang && ['en','es','fr','ja','zh','ko'].includes(savedLang)) {
      currentLang = savedLang;
      langBar.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
    }
  } catch(_) {}

  // 2. Restore saved amount
  try {
    const savedAmount = localStorage.getItem(LS_AMOUNT_KEY);
    if (savedAmount) {
      const parsed = parseInt(savedAmount, 10);
      if ([100, 500, 1000, 5000].includes(parsed)) {
        currentAmount = parsed;
        amountRow.querySelectorAll('.amount-chip').forEach(chip => {
          chip.classList.toggle('active', parseInt(chip.dataset.amount, 10) === currentAmount);
        });
      }
    }
  } catch(_) {}

  // 3. Restore last currency pair
  let restoredChip = null;
  try {
    const savedPair = localStorage.getItem(LS_PAIR_KEY);
    if (savedPair) {
      const { from, to } = JSON.parse(savedPair);
      if (from && to) {
        currentFrom = from;
        currentTo   = to;
        chipRow.querySelectorAll('.chip').forEach(chip => {
          if (chip.dataset.from === from && chip.dataset.to === to) restoredChip = chip;
        });
      }
    }
  } catch(_) {}

  // 4. Mark active chip
  if (restoredChip) {
    chipRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    restoredChip.classList.add('active');
  }

  // 5. Render all strings (subtitle, compare CTA label, footer CTA, amount label)
  renderStrings();

  // 6. Set footer CTA href
  footerCta.href = AFFILIATE_BASE;

  // 7. Set initial iframe src (may differ from HTML default if language/pair restored)
  wiseIframe.src = buildIframeSrc(currentFrom, currentTo, currentLang);

  // 8. Start health check
  startIframeHealthCheck();

  // 9. GA4 widget_view
  gaEvent('widget_view', { widget: 'currency', language: currentLang });

} catch(err) {
  showFallback('init');
}
</script>
</body>
</html>
